services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: __PROJECT_SLUG__-php
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/var/www/html
    environment:
      - PHP_MEMORY_LIMIT=256M
    depends_on:
      - db
    networks:
      - __PROJECT_SLUG__

  nginx:
    image: nginx:alpine
    container_name: __PROJECT_SLUG__-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - __PROJECT_SLUG__

  db:
    image: mariadb:11
    container_name: __PROJECT_SLUG__-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-wordpress}
      MYSQL_USER: ${DB_USER:-wordpress}
      MYSQL_PASSWORD: ${DB_PASSWORD:-wordpress}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - __PROJECT_SLUG__
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: __PROJECT_SLUG__-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - __PROJECT_SLUG__

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: __PROJECT_SLUG__-phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
    depends_on:
      db:
        condition: service_healthy
    networks:
      - __PROJECT_SLUG__

volumes:
  db_data:

networks:
  __PROJECT_SLUG__:
    driver: bridge
